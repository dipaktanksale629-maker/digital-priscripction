<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Digital Pad</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 10px; background: #f0f2f5; }
        .prescription-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; color: #007bff; border-bottom: 2px solid #eee; margin-bottom: 15px; }
        
        /* Input Fields - पेनने क्लिक केल्यावर कीबोर्ड/व्हॉइस उघडेल */
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #007bff; }

        .canvas-header { font-weight: bold; margin-bottom: 5px; color: #555; display: flex; justify-content: space-between; }
        
        #canvas-container { background: #fff; border: 2px solid #007bff; border-radius: 10px; position: relative; }
        canvas { width: 100%; height: 350px; touch-action: none; }
        
        .footer-btns { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-clear { background: #ff4757; color: white; }
        .btn-save { background: #2ed573; color: white; }
    </style>
</head>
<body>

<div class="prescription-card">
    <div class="header">
        <h2>DR. ABHAY'S DIGITAL PAD</h2>
    </div>

    <div class="input-group">
        <input type="text" id="name" placeholder="रुग्णाचे नाव (Patient Name)">
        <input type="text" id="vitals" placeholder="BP / Pulse / Wt">
    </div>

    <div class="canvas-header">
        <span>Rx (Handwritten Medicines):</span>
        <span id="eraser-status" style="color:red; font-size:12px; display:none;">Eraser ON</span>
    </div>

    <div id="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="footer-btns">
        <button class="btn-clear" onclick="clearAll()">Clear</button>
        <button class="btn-save" onclick="generatePDF()">Save PDF</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // Resize canvas
    canvas.width = canvas.offsetWidth;
    canvas.height = 350;

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.clientX || e.touches[0].clientX) - rect.left,
            y: (e.clientY || e.touches[0].clientY) - rect.top
        };
    }

    function start(e) { drawing = true; draw(e); }
    function stop() { drawing = false; ctx.beginPath(); }

    function draw(e) {
        if (!drawing) return;
        const pos = getPos(e);
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000';

        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stop);

    function clearAll() {
        if(confirm("पूर्ण पेज पुसायचे आहे का?")) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('name').value = "";
            document.getElementById('vitals').value = "";
        }
    }

    function generatePDF() {
        window.print();
    }
</script>

</body>
</html>
