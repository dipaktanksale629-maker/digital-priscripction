<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Abhay's Digital Pad</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f4f4; padding: 10px; }
        .pad { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #007bff; color: #007bff; margin-bottom: 10px; }
        .input-row { margin-bottom: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        canvas { border: 2px solid #333; background: #fafafa; cursor: crosshair; touch-action: none; width: 100%; height: 300px; }
        .btns { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .btn-clear { background: #e74c3c; }
        .btn-save { background: #2ecc71; }
    </style>
</head>
<body>

<div class="pad">
    <div class="header">
        <h2>DR. ABHAY SINGH</h2>
        <p>Reg No: 12345 | Satara</p>
    </div>

    <div class="input-row">
        <input type="text" placeholder="रुग्णाचे नाव (Name)">
        <input type="text" style="width: 80px;" placeholder="वय (Age)">
    </div>
    <div class="input-row">
        <input type="text" placeholder="Vitals (BP, Sugar, Pulse)">
    </div>

    <p><strong>Rx (औषधे खाली लिहा):</strong></p>
    <canvas id="canvas"></canvas>

    <div class="btns">
        <button class="btn-clear" onclick="clearCanvas()">Clear</button>
        <button class="btn-save" onclick="window.print()">Save PDF</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    canvas.width = canvas.offsetWidth;
    canvas.height = 300;

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.clientX || e.touches[0].clientX) - rect.left,
            y: (e.clientY || e.touches[0].clientY) - rect.top
        };
    }

    function start(e) { drawing = true; draw(e); }
    function stop() { drawing = false; ctx.beginPath(); }

    function draw(e) {
        if (!drawing) return;
        const pos = getPos(e);
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000';
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stop);

    function clearCanvas() {
        if(confirm("सगळे पुसायचे आहे का?")) ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
</script>

</body>
</html>
